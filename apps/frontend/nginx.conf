limit_req_zone $binary_remote_addr zone=vote_submit_per_ip:10m rate=${APP_VOTE_RATE_LIMIT};

resolver ${NGINX_DNS_RESOLVER} valid=10s ipv6=off;

map "${API_UPSTREAM_SCHEME}://${API_UPSTREAM_HOST}:${API_UPSTREAM_PORT}" $api_upstream {
  default "${API_UPSTREAM_SCHEME}://${API_UPSTREAM_HOST}:${API_UPSTREAM_PORT}";
}

server {
  listen 80;
  server_name _;
  error_page 429 = @vote_rate_limited;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  location = /vote.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  location = /admin.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  location = /config.js {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  location ~* \.(?:css|js|wasm)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header ${API_EDGE_AUTH_HEADER} "${API_EDGE_AUTH_SECRET}";
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass $api_upstream;
  }

  location ~ ^/api/votings/[^/]+/votes(?:/[^/]+)?$ {
    limit_req zone=vote_submit_per_ip;
    limit_req_status 429;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header ${API_EDGE_AUTH_HEADER} "${API_EDGE_AUTH_SECRET}";
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass $api_upstream;
  }

  location @vote_rate_limited {
    default_type application/json;
    return 429 '{"code":"rate_limited","message":"Please wait 3 seconds before voting again."}';
  }
}
