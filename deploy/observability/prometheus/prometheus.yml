global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: projector
    metrics_path: /metrics
    static_configs:
      - targets: ["projector:8081"]

  - job_name: kafka-exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
