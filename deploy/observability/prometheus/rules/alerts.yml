groups:
  - name: voting-platform-alerts
    rules:
      - alert: APIDown
        expr: up{job="api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API is down"
          description: "The API has been down for more than 1 minute"

      - alert: ProjectorDown
        expr: up{job="projector"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Projector is down"
          description: "The projector has been down for more than 1 minute"

      - alert: HighErrorRate
        expr: 100 * sum(rate(http_requests_total{status=~"5.."}[5m])) / clamp_min(sum(rate(http_requests_total[5m])), 1) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for more than 2 minutes"

      - alert: CriticalErrorRate
        expr: 100 * sum(rate(http_requests_total{status=~"5.."}[5m])) / clamp_min(sum(rate(http_requests_total[5m])), 1) > 20
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical error rate detected"
          description: "Error rate is above 20% for more than 1 minute"

      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m]))) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High P95 latency"
          description: "P95 latency is above 2 seconds for more than 3 minutes"

      - alert: CriticalLatencyP99
        expr: histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket[5m]))) > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical P99 latency"
          description: "P99 latency is above 5 seconds for more than 2 minutes"

      - alert: HighCPUUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% for more than 5 minutes"

      - alert: KafkaExporterDown
        expr: up{job="kafka-exporter"} == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Kafka exporter is down"
          description: "Kafka metrics exporter has been down for more than 1 minute"

      - alert: VoteDeliveryFailures
        expr: sum(rate(vote_delivery_errors_total[5m])) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High vote delivery failure rate"
          description: "Vote delivery errors are occurring at a high rate"

      - alert: NoVotesAccepted
        expr: sum(rate(votes_accepted_total[5m])) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No votes accepted"
          description: "No votes have been accepted in the last 5 minutes"
