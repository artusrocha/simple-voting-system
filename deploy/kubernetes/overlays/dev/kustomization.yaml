apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: voting-platform-dev

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

images:
  - name: ghcr.io/laager-project/voting-platform-api
    newTag: dev
  - name: ghcr.io/laager-project/voting-platform-projector
    newTag: dev
  - name: ghcr.io/laager-project/voting-platform-frontend
    newTag: dev
