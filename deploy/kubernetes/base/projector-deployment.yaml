apiVersion: apps/v1
kind: Deployment
metadata:
  name: projector
  namespace: voting-platform
  labels:
    app: projector
    component: projector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: projector
  template:
    metadata:
      labels:
        app: projector
        component: projector
    spec:
      containers:
        - name: projector
          image: ghcr.io/laager-project/voting-platform-projector:latest
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: KAFKA_BROKERS
              value: "kafka:9092"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
