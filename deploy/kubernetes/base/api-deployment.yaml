apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: voting-platform
  labels:
    app: api
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/laager-project/voting-platform-api:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KAFKA_BROKERS
              value: "kafka:9092"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
