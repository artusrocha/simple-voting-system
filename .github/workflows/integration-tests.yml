name: integration-tests

on:
  pull_request:
  push:
    branches:
      - main
      - 'feature/**'

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: docker compose version

      - name: Build and start stack
        run: docker compose --env-file configs/dev.env -f deploy/compose/docker-compose.yml up -d --build

      - name: Wait for API to be ready
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8080/healthz >/dev/null; then
              echo "API is ready"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          exit 1

      - name: Run integration tests
        run: |
          bash tests/integration/voting-api.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose --env-file configs/dev.env -f deploy/compose/docker-compose.yml logs

      - name: Stop stack
        if: always()
        run: docker compose --env-file configs/dev.env -f deploy/compose/docker-compose.yml down -v
